name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'benchmarks/**'
  merge_group:

jobs:
  # Fast checks run first
  check:
    name: Lint, Typecheck, Knip, Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Run checks (lint, typecheck, knip, audit)
        run: make check

  # Unit tests and build
  test:
    name: Unit Tests & Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Run unit tests
        run: make test

      - name: Build all
        run: make build-all

  # E2E tests with sharding for speed
  e2e:
    name: E2E Tests (Shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Build widget
        run: make build-widget

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E Tests (Shard ${{ matrix.shard }}/2)
        run: make test-e2e-shard SHARD=${{ matrix.shard }}/2
        env:
          CI: true

      - name: Upload E2E Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

  # Deploy to preview CF Worker (merge queue only)
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Build all
        run: make build-all

      - name: Deploy to preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview

  # Live E2E tests against real cross-origin deployment (merge queue only)
  live-preview-tests:
    name: Live Preview Tests
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    if: github.event_name == 'merge_group'
    env:
      PLAYWRIGHT_BASE_URL: https://bugdrop-widget-test-git-preview-jermwatts-projects.vercel.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for preview widget deployment
        run: |
          WORKER_URL="https://bugdrop-preview.neonwatty.workers.dev/api/health"
          echo "Polling $WORKER_URL until ready..."
          for i in $(seq 1 30); do
            if curl -sfo /dev/null "$WORKER_URL"; then
              echo "Preview worker ready after $((i * 10))s"
              exit 0
            fi
            echo "Attempt $i/30 — not ready, waiting 10s..."
            sleep 10
          done
          echo "Preview worker not ready after 300s"
          exit 1

      - name: Verify test venue is reachable
        run: |
          VENUE_URL="${PLAYWRIGHT_BASE_URL}"
          echo "Checking test venue at $VENUE_URL..."
          BYPASS_ARGS=""
          if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            BYPASS_ARGS="-H x-vercel-protection-bypass:${VERCEL_AUTOMATION_BYPASS_SECRET}"
          fi
          curl -sfo /dev/null $BYPASS_ARGS "$VENUE_URL" || (echo "Test venue unreachable at $VENUE_URL" && exit 1)
          echo "Test venue reachable"
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Run live E2E tests
        run: npx playwright test --project=chromium-live --workers=1
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-live-report
          path: playwright-report/
          retention-days: 7

  # Automated release via semantic-release (only on push to main)
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy to Cloudflare Workers (runs after release on push to main)
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Build all
        run: make build-all

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
