name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

jobs:
  # Fast checks run first
  check:
    name: Lint, Typecheck, Knip, Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Run checks (lint, typecheck, knip, audit)
        run: make check

  # Unit tests and build
  test:
    name: Unit Tests & Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Run unit tests
        run: make test

      - name: Build all
        run: make build-all

  # E2E tests with sharding for speed
  e2e:
    name: E2E Tests (Shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Build widget
        run: make build-widget

      - name: Install Playwright
        run: make install-playwright

      - name: Run E2E Tests (Shard ${{ matrix.shard }}/2)
        run: make test-e2e-shard SHARD=${{ matrix.shard }}/2
        env:
          CI: true

      - name: Upload E2E Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

  # Deploy to preview CF Worker (merge queue only — one PR at a time)
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Build all
        run: make build-all

      - name: Deploy to preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview

  # Live E2E tests against real cross-origin deployment (merge queue only)
  live-preview-tests:
    name: Live Preview Tests
    needs: [deploy-preview]
    if: github.event_name == 'merge_group'
    uses: ./.github/workflows/live-tests.yml
    with:
      target: preview
    continue-on-error: true

  # Automated release via semantic-release (only on push to main)
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy to Cloudflare Workers (runs after release on push to main)
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Build all
        run: make build-all

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
